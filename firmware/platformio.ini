; Subscreen firmware for Waveshare ESP32-C6-LCD-1.47
; Edit WiFi and bridge host before uploading.

[platformio]
default_envs = esp32-c6-lcd-147
boards_dir = boards

[env:esp32-c6-lcd-147]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101
board_build.flash_mode = qio
board_build.partitions = huge_app.csv

lib_deps =
    lvgl/lvgl@^9.2.0
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -I include
    -D LV_CONF_INCLUDE_SIMPLE
    -D CORE_DEBUG_LEVEL=1
    -D WIFI_SSID=\"Product_aiot-ovs\"
    -D WIFI_PASS=\"Nicaiyixia\"
    -D BRIDGE_HOST=\"192.168.0.79\"
    -D BRIDGE_PORT=8765

build_src_filter =
    +<*>
    +<../include>
